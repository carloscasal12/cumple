<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Si El Mundo Pesa</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600;700&display=swap');
    :root { --bg:#fff9f5; --bg2:#ffe0ea; --rose:#b51f54; --ink:#471728; --soft:#7a4357; --card:rgba(255,255,255,.88); --shadow:rgba(95,23,48,.18); }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; font-family:"Playfair Display", Georgia, serif; color:var(--ink); background:radial-gradient(circle at 14% 12%, rgba(255,255,255,.82), transparent 28%), linear-gradient(145deg,var(--bg),var(--bg2)); }
    main { width:min(920px,100%); margin:0 auto; padding:54px 20px; text-align:center; }
    .eyebrow { margin:0 0 12px; text-transform:uppercase; letter-spacing:.16em; font-size:.78rem; color:var(--soft); }
    h1 { margin:0; font-family:"Great Vibes", cursive; font-size:clamp(3.2rem,9vw,6.4rem); line-height:.95; color:var(--rose); }
    .lead { max-width:720px; margin:20px auto 28px; color:var(--soft); line-height:1.75; font-size:1.08rem; }
    .panel { padding:clamp(24px,5vw,44px); border-radius:28px; background:var(--card); border:1px solid rgba(181,31,84,.16); box-shadow:0 22px 48px var(--shadow); }
    .message { margin:0; color:var(--ink); font-size:clamp(1.25rem,4vw,2rem); line-height:1.55; }
    .choices { margin-top:24px; display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:12px; }
    button { border:0; border-radius:999px; padding:13px 18px; background:linear-gradient(135deg,#ff6493,var(--rose)); color:#fff; font-family:inherit; font-weight:700; cursor:pointer; box-shadow:0 14px 26px rgba(181,31,84,.2); }
    .secondary { margin-top:28px; background:#fff; color:var(--rose); border:1px solid rgba(181,31,84,.18); }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Para días difíciles</p>
    <h1>Si El Mundo Pesa</h1>
    <p class="lead">Una página para cuando el día se hace grande, para recordarte que no tienes que poder con todo sola.</p>
    <section class="panel" aria-live="polite">
      <p class="message" id="message">Respira. No tienes que resolver tu vida entera hoy. Solo estar aquí ya cuenta.</p>
      <div class="choices">
        <button type="button" data-text="Estoy contigo. No para exigirte que estés bien rápido, sino para quedarme mientras vuelves a encontrarte.">Necesito calma</button>
        <button type="button" data-text="Eres mucho más fuerte de lo que sientes ahora, pero también mereces descansar. Una cosa no quita la otra.">Necesito ánimo</button>
        <button type="button" data-text="Ven aquí. Te abrazaría fuerte, sin hablar si no hace falta, hasta que todo pesara un poco menos.">Necesito abrazo</button>
        <button type="button" data-text="No eres una carga. Tus días malos también caben en mi forma de quererte.">Necesito amor</button>
      </div>
    </section>
    <button class="secondary" onclick="location.href='index.html'">Volver al inicio</button>
  </main>
  <script>
    const message = document.getElementById("message");
    document.querySelectorAll("[data-text]").forEach((button) => {
      button.addEventListener("click", () => {
        message.textContent = button.dataset.text;
      });
    });
  </script>
</body>
</html>
