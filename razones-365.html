<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>365 Razones</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600;700&display=swap');

    :root {
      --cream: #fff9f5;
      --blush: #ffe0ea;
      --rose: #e83f74;
      --rose-dark: #b51f54;
      --ink: #471728;
      --soft: #7a4357;
      --card: rgba(255, 255, 255, 0.84);
      --shadow: rgba(95, 23, 48, 0.16);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Playfair Display", Georgia, serif;
      background:
        radial-gradient(circle at 12% 10%, rgba(255, 255, 255, 0.82), transparent 28%),
        radial-gradient(circle at 86% 24%, rgba(255, 166, 194, 0.36), transparent 30%),
        linear-gradient(145deg, var(--cream), var(--blush));
    }

    header {
      text-align: center;
      padding: 58px 20px 24px;
    }

    .eyebrow {
      margin: 0 0 12px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 0.78rem;
      color: var(--soft);
    }

    h1 {
      margin: 0;
      font-family: "Great Vibes", "Brush Script MT", cursive;
      font-size: clamp(3.1rem, 9vw, 6.2rem);
      line-height: 0.95;
      color: var(--rose-dark);
    }

    .lead {
      max-width: 720px;
      margin: 20px auto 0;
      color: var(--soft);
      line-height: 1.75;
      font-size: 1.08rem;
    }

    main {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 18px 20px 62px;
    }

    .tools {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .btn {
      border: 0;
      border-radius: 999px;
      padding: 13px 22px;
      background: linear-gradient(135deg, #ff6493, var(--rose-dark));
      color: #fff;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 14px 26px rgba(181, 31, 84, 0.22);
      transition: transform 180ms ease;
    }

    .btn.secondary {
      background: #fff;
      color: var(--rose-dark);
      border: 1px solid rgba(181, 31, 84, 0.18);
    }

    .btn:hover { transform: translateY(-2px); }

    .featured {
      margin-bottom: 18px;
      padding: clamp(20px, 4vw, 30px);
      border-radius: 24px;
      background: var(--card);
      border: 1px solid rgba(181, 31, 84, 0.16);
      box-shadow: 0 18px 38px var(--shadow);
      text-align: center;
    }

    .featured strong {
      display: block;
      color: var(--rose-dark);
      margin-bottom: 8px;
      font-size: 1.05rem;
    }

    .featured p {
      margin: 0;
      color: var(--ink);
      line-height: 1.65;
      font-size: clamp(1.2rem, 3vw, 1.8rem);
    }

    .reasons-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 12px;
      max-height: 620px;
      overflow: auto;
      padding: 4px;
    }

    .reason {
      min-height: 128px;
      padding: 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(181, 31, 84, 0.12);
      box-shadow: 0 12px 24px rgba(95, 23, 48, 0.09);
    }

    .reason strong {
      display: block;
      color: var(--rose-dark);
      margin-bottom: 8px;
    }

    .reason p {
      margin: 0;
      color: var(--soft);
      line-height: 1.55;
    }
  </style>
</head>

<body>
  <header>
    <p class="eyebrow">Una razón para cada día</p>
    <h1>365 Razones</h1>
    <p class="lead">Una lista larga, exagerada y aun así insuficiente de motivos por los que te quiero.</p>
  </header>

  <main>
    <div class="tools">
      <button class="btn" id="randomReason" type="button">Razón aleatoria</button>
      <button class="btn secondary" onclick="location.href='index.html'">Volver al inicio</button>
    </div>

    <section class="featured" aria-live="polite">
      <strong id="featuredNumber">Razón 001</strong>
      <p id="featuredText">Porque desde que estás, los días tienen algo más bonito.</p>
    </section>

    <section class="reasons-grid" id="reasonsGrid" aria-label="Lista de 365 razones"></section>
  </main>

  <script>
    const customReasons = [
      "Porque desde que estás, los días tienen algo más bonito.",
      "Porque tu sonrisa me sigue ganando.",
      "Porque contigo aprendí que el amor también puede ser calma.",
      "Porque me haces reír incluso cuando no tengo ganas.",
      "Porque cuidar de ti me sale solo.",
      "Porque me encanta verte ilusionada.",
      "Porque tienes detalles que se quedan conmigo.",
      "Porque contigo los planes pequeños parecen enormes.",
      "Porque eres mi persona favorita para contarle todo.",
      "Porque cada 20 de enero me recuerda lo bien que hice en elegirte.",
      "Porque admiro tu fuerza.",
      "Porque tienes una forma preciosa de mirar el mundo.",
      "Porque tus abrazos arreglan días.",
      "Porque contigo siempre quiero un rato más.",
      "Porque me gusta la vida cuando la comparto contigo.",
      "Porque eres hogar.",
      "Porque hasta tus manías me hacen sonreír.",
      "Porque quiero seguir viajando contigo.",
      "Porque Roma contigo suena todavía mejor.",
      "Porque te elegiría otra vez."
    ];

    const templates = [
      "Porque me haces feliz de una forma que no necesito explicar.",
      "Porque hay algo en ti que siempre me da paz.",
      "Porque contigo todo tiene un poco más de sentido.",
      "Porque me encanta la persona que eres.",
      "Porque sigues siendo mi parte favorita del día.",
      "Porque quererte es fácil.",
      "Porque me haces sentir afortunado.",
      "Porque contigo quiero futuro.",
      "Porque tus pequeños gestos me importan muchísimo.",
      "Porque eres tú, y eso ya es razón suficiente."
    ];

    const reasons = Array.from({ length: 365 }, (_, index) => {
      return customReasons[index] || templates[index % templates.length];
    });

    const grid = document.getElementById("reasonsGrid");
    const featuredNumber = document.getElementById("featuredNumber");
    const featuredText = document.getElementById("featuredText");

    reasons.forEach((text, index) => {
      const article = document.createElement("article");
      article.className = "reason";
      article.innerHTML = `<strong>Razón ${String(index + 1).padStart(3, "0")}</strong><p>${text}</p>`;
      grid.appendChild(article);
    });

    document.getElementById("randomReason").addEventListener("click", () => {
      const index = Math.floor(Math.random() * reasons.length);
      featuredNumber.textContent = `Razón ${String(index + 1).padStart(3, "0")}`;
      featuredText.textContent = reasons[index];
    });
  </script>
</body>
</html>
