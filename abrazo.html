<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Abrazo Virtual</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600;700&display=swap');

    :root {
      --cream: #fff9f5;
      --blush: #ffe0ea;
      --rose: #e83f74;
      --rose-dark: #b51f54;
      --ink: #471728;
      --soft: #7a4357;
      --card: rgba(255, 255, 255, 0.86);
      --shadow: rgba(95, 23, 48, 0.18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      color: var(--ink);
      font-family: "Playfair Display", Georgia, serif;
      background:
        radial-gradient(circle at 14% 12%, rgba(255, 255, 255, 0.82), transparent 28%),
        radial-gradient(circle at 86% 22%, rgba(255, 166, 194, 0.38), transparent 30%),
        linear-gradient(145deg, var(--cream), var(--blush));
      overflow-x: hidden;
    }

    main {
      width: min(920px, 100%);
      margin: auto;
      padding: 42px 20px;
      text-align: center;
    }

    .eyebrow {
      margin: 0 0 12px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 0.78rem;
      color: var(--soft);
    }

    h1 {
      margin: 0;
      font-family: "Great Vibes", "Brush Script MT", cursive;
      font-size: clamp(3.2rem, 9vw, 6.4rem);
      line-height: 0.95;
      color: var(--rose-dark);
    }

    .lead {
      max-width: 690px;
      margin: 20px auto 28px;
      color: var(--soft);
      line-height: 1.75;
      font-size: 1.08rem;
    }

    .hug-card {
      position: relative;
      min-height: 330px;
      display: grid;
      place-items: center;
      padding: clamp(26px, 5vw, 48px);
      border-radius: 28px;
      background: var(--card);
      border: 1px solid rgba(181, 31, 84, 0.16);
      box-shadow: 0 22px 48px var(--shadow);
      backdrop-filter: blur(12px);
      overflow: hidden;
    }

    .hug {
      position: relative;
      width: min(280px, 72vw);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
    }

    .heart {
      width: 120px;
      height: 120px;
      position: relative;
      transform: rotate(45deg);
      background: linear-gradient(135deg, #ff7aa2, var(--rose-dark));
      border-radius: 24px;
      box-shadow: 0 18px 34px rgba(181, 31, 84, 0.24);
      transition: transform 420ms ease;
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: inherit;
    }

    .heart::before { left: -60px; top: 0; }
    .heart::after { left: 0; top: -60px; }

    .arm {
      position: absolute;
      width: 150px;
      height: 72px;
      border: 14px solid #ff9db9;
      border-top: 0;
      border-radius: 0 0 90px 90px;
      opacity: 0.9;
      transition: transform 520ms ease;
    }

    .arm.left {
      left: 10px;
      transform: rotate(34deg) translateX(-28px);
    }

    .arm.right {
      right: 10px;
      transform: rotate(-34deg) translateX(28px);
    }

    .hug-card.active .heart {
      animation: beat 900ms ease infinite;
    }

    .hug-card.active .arm.left {
      transform: rotate(18deg) translateX(8px) translateY(16px);
    }

    .hug-card.active .arm.right {
      transform: rotate(-18deg) translateX(-8px) translateY(16px);
    }

    .message {
      margin: 18px 0 0;
      color: var(--ink);
      font-size: clamp(1.25rem, 3vw, 1.8rem);
      line-height: 1.45;
      min-height: 58px;
    }

    .floating-heart {
      position: absolute;
      bottom: 38px;
      color: var(--rose-dark);
      font-size: 1.4rem;
      opacity: 0;
      animation: floatUp 1400ms ease forwards;
      pointer-events: none;
    }

    .actions {
      margin-top: 26px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      border: 0;
      border-radius: 999px;
      padding: 13px 22px;
      background: linear-gradient(135deg, #ff6493, var(--rose-dark));
      color: #fff;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 14px 26px rgba(181, 31, 84, 0.22);
      transition: transform 180ms ease;
    }

    .btn.secondary {
      background: #fff;
      color: var(--rose-dark);
      border: 1px solid rgba(181, 31, 84, 0.18);
    }

    .btn:hover { transform: translateY(-2px); }

    @keyframes beat {
      0%, 100% { transform: rotate(45deg) scale(1); }
      45% { transform: rotate(45deg) scale(1.09); }
    }

    @keyframes floatUp {
      0% { transform: translateY(0) scale(0.8); opacity: 0; }
      18% { opacity: 1; }
      100% { transform: translateY(-150px) scale(1.5); opacity: 0; }
    }
  </style>
</head>

<body>
  <main>
    <p class="eyebrow">Para cuando necesites un abrazo</p>
    <h1>Abrazo Virtual</h1>
    <p class="lead">Pulsa el botón y recibe un abrazo pequeñito desde esta página, pero enorme de intención.</p>

    <section class="hug-card" id="hugCard" aria-live="polite">
      <div>
        <div class="hug" aria-hidden="true">
          <div class="arm left"></div>
          <div class="heart"></div>
          <div class="arm right"></div>
        </div>
        <p class="message" id="message">Estoy aquí, incluso cuando no puedo abrazarte en persona.</p>
      </div>
    </section>

    <div class="actions">
      <button class="btn" id="hugButton" type="button">Dame un abrazo</button>
      <button class="btn secondary" onclick="location.href='index.html'">Volver al inicio</button>
    </div>
  </main>

  <script>
    const messages = [
      "Abrazo enviado. De esos que aprietan un poquito y arreglan el día.",
      "Ven aquí, amor. Hoy el mundo puede esperar.",
      "Te abrazo fuerte, con calma y con todo mi cariño.",
      "Ojalá estuviera ahí para abrazarte de verdad.",
      "Este abrazo viene con un te quiero incluido."
    ];

    const card = document.getElementById("hugCard");
    const button = document.getElementById("hugButton");
    const message = document.getElementById("message");
    let index = 0;

    function createFloatingHeart() {
      const heart = document.createElement("span");
      heart.className = "floating-heart";
      heart.textContent = "♥";
      heart.style.left = `${35 + Math.random() * 30}%`;
      card.appendChild(heart);
      setTimeout(() => heart.remove(), 1500);
    }

    button.addEventListener("click", () => {
      card.classList.add("active");
      message.textContent = messages[index % messages.length];
      index += 1;
      createFloatingHeart();
      setTimeout(() => card.classList.remove("active"), 1600);
    });
  </script>
</body>
</html>
