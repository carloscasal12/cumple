<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mensajes Por Hora</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600;700&display=swap');
    :root { --bg:#fff9f5; --bg2:#ffe0ea; --rose:#b51f54; --ink:#471728; --soft:#7a4357; --card:rgba(255,255,255,.86); --shadow:rgba(95,23,48,.18); }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; font-family:"Playfair Display", Georgia, serif; color:var(--ink); background:radial-gradient(circle at 14% 12%, rgba(255,255,255,.82), transparent 28%), linear-gradient(145deg,var(--bg),var(--bg2)); }
    main { width:min(920px,100%); margin:0 auto; padding:54px 20px; text-align:center; }
    .eyebrow { margin:0 0 12px; text-transform:uppercase; letter-spacing:.16em; font-size:.78rem; color:var(--soft); }
    h1 { margin:0; font-family:"Great Vibes", cursive; font-size:clamp(3.1rem,9vw,6.2rem); line-height:.95; color:var(--rose); }
    .lead { max-width:720px; margin:20px auto 28px; color:var(--soft); line-height:1.75; font-size:1.08rem; }
    .clock-card { padding:clamp(24px,5vw,46px); border-radius:28px; background:var(--card); border:1px solid rgba(181,31,84,.16); box-shadow:0 22px 48px var(--shadow); }
    .time { display:inline-grid; place-items:center; min-width:132px; height:54px; padding:0 20px; border-radius:999px; color:#fff; background:linear-gradient(135deg,#ff6493,var(--rose)); font-size:1.35rem; font-weight:700; font-variant-numeric:tabular-nums; }
    .message { margin:24px auto 0; max-width:700px; font-size:clamp(1.35rem,4vw,2.3rem); line-height:1.38; color:var(--ink); }
    .slot { margin:14px 0 0; color:var(--soft); line-height:1.7; }
    .actions { margin-top:28px; display:flex; justify-content:center; gap:12px; flex-wrap:wrap; }
    button { border:0; border-radius:999px; padding:13px 22px; background:linear-gradient(135deg,#ff6493,var(--rose)); color:#fff; font-family:inherit; font-weight:700; cursor:pointer; box-shadow:0 14px 26px rgba(181,31,84,.22); }
    .secondary { background:#fff; color:var(--rose); border:1px solid rgba(181,31,84,.18); }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Un mensaje distinto según la hora</p>
    <h1>Mensajes Por Hora</h1>
    <p class="lead">La página mira la hora y te deja una frase para ese momento del día.</p>
    <section class="clock-card" aria-live="polite">
      <span class="time" id="time">00:00</span>
      <p class="message" id="message"></p>
      <p class="slot" id="slot"></p>
    </section>
    <div class="actions">
      <button id="refresh" type="button">Actualizar mensaje</button>
      <button class="secondary" onclick="location.href='index.html'">Volver al inicio</button>
    </div>
  </main>
  <script>
    const time = document.getElementById("time");
    const message = document.getElementById("message");
    const slot = document.getElementById("slot");
    const messages = {
      madrugada: "Si estás despierta a estas horas, ojalá pudiera darte calma y quedarme contigo hasta que el sueño vuelva.",
      manana: "Buenos días, mi amor. Ojalá hoy encuentres motivos pequeños para sonreír y acordarte de lo mucho que te quiero.",
      tarde: "A esta hora solo quería recordarte que sigo pensando en ti, incluso en mitad de cualquier día normal.",
      noche: "Buenas noches, preciosa. Que descanses sabiendo que eres una de mis partes favoritas de la vida."
    };
    function update() {
      const now = new Date();
      const hour = now.getHours();
      time.textContent = now.toLocaleTimeString("es-ES", { hour: "2-digit", minute: "2-digit" });
      const key = hour < 6 ? "madrugada" : hour < 13 ? "manana" : hour < 21 ? "tarde" : "noche";
      const names = { madrugada: "Madrugada", manana: "Mañana", tarde: "Tarde", noche: "Noche" };
      message.textContent = messages[key];
      slot.textContent = `Mensaje de ${names[key].toLowerCase()}.`;
    }
    document.getElementById("refresh").addEventListener("click", update);
    update();
    setInterval(update, 30000);
  </script>
</body>
</html>
